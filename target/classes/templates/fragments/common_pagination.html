<div th:fragment="paginationControls(pageData, currentSortField, currentSortDir, filters)">
    <nav th:if="${pageData.totalPages > 0}" class="flex items-center justify-between mt-4">

        <div class="flex items-center text-sm
            px-3 py-1.5 rounded-lg shadow-sm">

<!--            <svg class="w-4 h-4 mr-2 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">-->
<!--                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"-->
<!--                      d="M4 7h16M4 12h16M4 17h16"/>-->
<!--            </svg>-->
<!--            <span th:text="#{global.total.records}"></span>-->
<!--            <span class="ml-1 font-bold text-cyan-700 text-base"-->
<!--                  th:text="${pageData.totalElements}"></span>-->
        </div>


        <!-- Pagination links -->
        <div class="flex items-center space-x-4">
            <ul th:if="${pageData.totalPages > 1}" class="inline-flex items-center space-x-1 text-sm">

                <!-- First -->
                <li>
                    <a href="javascript:void(0)" th:data-page="1"
                       th:classappend="${pageData.number + 1 == 1} ? 'pointer-events-none opacity-50' : ''"
                       class="flex items-center justify-center w-8 h-8 text-gray-500 bg-white border border-gray-300 rounded-md hover:bg-gray-100 hover:text-gray-700">
                        &laquo;&laquo;
                    </a>
                </li>

                <!-- Previous -->
                <li>
                    <a href="javascript:void(0)"
                       th:data-page="${pageData.number == 0 ? 1 : pageData.number}"
                       th:classappend="${pageData.number == 0} ? 'pointer-events-none opacity-50' : ''"
                       class="flex items-center justify-center w-8 h-8 text-gray-500 bg-white border border-gray-300 rounded-md hover:bg-gray-100 hover:text-gray-700">
                        &laquo;
                    </a>
                </li>

                <!-- Page numbers -->
                <li th:each="i : ${#numbers.sequence(1, pageData.totalPages)}"
                    th:if="${i >= pageData.number + 1 - 3 and i <= pageData.number + 1 + 3}">
                    <a href="javascript:void(0)" th:data-page="${i}"
                       class="page-link flex items-center justify-center w-8 h-8 border"
                       th:text="${i}"
                       th:classappend="${i == pageData.number + 1} ? 'bg-cyan-600 text-white rounded-md border-cyan-600' : 'bg-white text-gray-700 rounded-md border-gray-300 hover:bg-gray-100'">
                    </a>
                </li>

                <!-- Next -->
                <li>
                    <a href="javascript:void(0)"
                       th:data-page="${pageData.number + 2 > pageData.totalPages ? pageData.totalPages : pageData.number + 2}"
                       th:classappend="${pageData.number + 1 == pageData.totalPages} ? 'pointer-events-none opacity-50' : ''"
                       class="flex items-center justify-center w-8 h-8 text-gray-500 bg-white border border-gray-300 rounded-md hover:bg-gray-100 hover:text-gray-700">
                        &raquo;
                    </a>
                </li>

                <!-- Last -->
                <li>
                    <a href="javascript:void(0)" th:data-page="${pageData.totalPages}"
                       th:classappend="${pageData.number + 1 == pageData.totalPages} ? 'pointer-events-none opacity-50' : ''"
                       class="flex items-center justify-center w-8 h-8 text-gray-500 bg-white border border-gray-300 rounded-md hover:bg-gray-100 hover:text-gray-700">
                        &raquo;&raquo;
                    </a>
                </li>

            </ul>
        </div>
    </nav>

    <script th:inline="javascript">
        /*<![CDATA[*/
        (function () {
            const filters = /*[[${filters}]]*/ {};
            const pageLinks = document.querySelectorAll('.page-link, [data-page]');

            pageLinks.forEach(a => {
                const page = a.getAttribute('data-page');
                const params = new URLSearchParams();
                params.set('page', page);
                params.set('size', /*[[${pageData.size}]]*/ 10);
                params.set('sortField', /*[[${currentSortField}]]*/ '');
                params.set('sortDir', /*[[${currentSortDir}]]*/ '');
                for (const key in filters) {
                    if (filters[key] && filters[key].trim().length > 0) params.set(key, filters[key]);
                }
                a.href = window.location.pathname + '?' + params.toString();
            });

            // PageSize change
            const pageSizeSelect = document.getElementById('pageSizeSelect');
            pageSizeSelect.addEventListener('change', function () {
                const newSize = this.value;
                const params = new URLSearchParams();
                params.set('page', 1);
                params.set('size', newSize);
                params.set('sortField', /*[[${currentSortField}]]*/ '');
                params.set('sortDir', /*[[${currentSortDir}]]*/ '');
                for (const key in filters) {
                    if (filters[key] && filters[key].trim().length > 0) params.set(key, filters[key]);
                }
                window.location.href = window.location.pathname + '?' + params.toString();
            });
        })();
        /*]]>*/
    </script>
</div>
