<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title th:text="#{page.error.title}"></title>
    
    <link th:href="@{/css/output.css}" rel="stylesheet">
    

    <style>
        body { font-family: "IBM Plex Sans", sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 flex items-center justify-center h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden text-center p-8 md:p-10">
        
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 mb-6">
            <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-800 mb-2" th:text="#{page.error.heading}"></h1>
        
        <p class="text-gray-500 mb-6" th:text="#{page.error.message}"></p>

        <div class="bg-gray-50 rounded-lg p-4 mb-6 border border-gray-200 text-left" th:if="${status} or ${error}">
            <div class="flex justify-between items-center mb-1" th:if="${status}">
                <span class="text-xs font-semibold text-gray-500 uppercase" th:text="#{page.error.code}">CODE</span>
                <span class="text-sm font-mono font-bold text-red-600" th:text="${status}">500</span>
            </div>
            <div class="text-xs font-mono text-gray-600 break-all" th:if="${error}" th:text="${message}">
                Unexpected Error...
            </div>
        </div>

        <a href="/" 
           class="inline-block w-full text-white bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-3 text-center shadow-lg transform transition hover:-translate-y-0.5"
           th:text="#{page.error.button.home}">
        </a>
        
    </div>

</body>
</html>
