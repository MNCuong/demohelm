<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="page-type" content="login">
    <title th:text="#{page.login.title}"></title>
    
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <script defer th:src="@{/js/alpine.min.js}"></script>
    <style>
        body { font-family: "IBM Plex Sans" }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-linear-to-br from-slate-900 via-blue-900 to-slate-900 flex items-center justify-center h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden transform transition-all ">
        
        <div class="p-8 md:p-10">
            <div class="text-center mb-8">
                <img th:src="@{/images/logo.png}" 
                     alt="Logo" 
                     class="h-20 w-auto mx-auto mb-4 object-contain"> 

                <h2 class="text-3xl font-bold text-gray-800 tracking-tight" th:text="#{page.login.app.name}"></h2>
                
                <p class="text-gray-500 text-sm mt-2" th:text="#{page.login.app.description}"></p>
            </div>

            <div th:if="${param.error}" class="mb-6 flex items-center p-4 text-sm text-red-800 border border-red-200 rounded-lg bg-red-50" role="alert">
                <svg class="shrink-0 inline w-4 h-4 mr-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/>
                </svg>
                <div th:text="#{page.login.msg.error}"></div>
            </div>

            <div th:if="${param.logout}" 
                 x-data="{ show: true }"
                 x-init="setTimeout(() => { 
                            show = false; 
                            window.history.replaceState({}, document.title, window.location.pathname);
                         }, 3000)"
                 x-show="show"
                 x-transition.duration.500ms
                 class="mb-6 flex items-center p-4 text-sm text-green-800 border border-green-200 rounded-lg bg-green-50" 
                 role="alert">
                
                <svg class="shrink-0 inline w-4 h-4 mr-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/>
                </svg>
                <div th:text="#{page.login.msg.logout}"></div>
                
            </div>

            <form class="space-y-6" th:action="@{/login-process}" method="post">
                
                <div>
                    <label for="username" class="block mb-2 text-sm font-medium text-gray-700" th:text="#{page.login.label.username}"></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                            </svg>
                        </div>
                        <input id="username" name="username" type="text" required
                               class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-3 transition-colors"
                               th:placeholder="#{page.login.placeholder.username}">
                    </div>
                </div>

                <div>
                    <label for="password" class="block mb-2 text-sm font-medium text-gray-700" th:text="#{page.login.label.password}"></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                            </svg>
                        </div>
                        <input id="password" name="password" type="password" required
                               class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-3 transition-colors"
                               th:placeholder="#{page.login.placeholder.password}">
                    </div>
                </div>

<!--                <div class="flex items-center justify-between">-->
<!--                    <div class="flex items-start">-->
<!--                        <div class="flex items-center h-5">-->
<!--                            <input id="remember" type="checkbox" name="remember-me" class="w-4 h-4 border border-gray-300 rounded bg-gray-50 focus:ring-3 focus:ring-blue-300">-->
<!--                        </div>-->
<!--                        <label for="remember" class="ml-2 text-sm font-medium text-gray-500" th:text="#{page.login.label.remember}"></label>-->
<!--                    </div>-->
<!--                </div>-->

                <button type="submit"
                        class="w-full text-white bg-linear-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-3 text-center shadow-lg transform transition hover:-translate-y-0.5"
                        th:text="#{page.login.button.submit}">
                </button>

            </form>
        </div>
        
        <div class="bg-gray-50 py-4 text-center border-t border-gray-100">
            <p class="text-xs text-gray-500" th:text="#{page.login.footer.copyright}"></p>
        </div>
    </div>

</body>
</html>
