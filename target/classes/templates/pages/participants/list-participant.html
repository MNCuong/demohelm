<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title layout:fragment="title" th:text="#{page.participant.title}"></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="/js/tailwind.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#00d4d4', 'primary-hover': '#00b8b8' },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(0, 212, 212, 0.12)',
                        'card': '0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    }
                }
            }
        }
    </script>

    <style>
        .action-menu-fixed {
            position: fixed !important;
            z-index: 9999 !important;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-slate-50 via-cyan-50 to-teal-50 min-h-screen">

<div layout:fragment="content">
    <div class="mb-10">
        <h1 class="text-4xl font-extrabold text-transparent-black bg-clip-text bg-gradient-to-r from-cyan-600 to-teal-600"
            th:text="#{page.participant.title}"></h1>
        <p class="mt-2 text-sm text-gray-500" th:text="#{page.participant.subtitle}"></p>
    </div>

    <div class="glassmorphism rounded-3xl shadow-card overflow-hidden border border-white/20">
        <div class="bg-white/70 border-b border-gray-200/50 px-1 py-4">
            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                <form th:action="@{/participants/list-participants}" method="get" class="relative w-full max-w-xl ">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-4 h-4 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="block w-full pl-10 pr-24 sm:pr-32 py-2 bg-white/80 border focus:border-blue-500 rounded-md text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-cyan-500/20 focus:bg-white transition-all duration-300 text-sm font-medium"
                           th:placeholder="#{page.participants.search.placeholder}"/>
                </form>

                <button type="button" sec:authorize="!hasRole('MONITOR')"
                        class="open-modal-btn inline-flex items-center gap-2 bg-cyan-600 hover:bg-cyan-800 text-white font-bold px-5 py-2.5 rounded-md shadow-xl hover:shadow-2xl"
                        data-modal-url="/participants/add-participant"
                        th:attr="data-modal-title=#{page.participant.button.add_participant}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
                    </svg>
                    <span th:text="#{page.participant.button.add_participant}"></span>
                </button>
            </div>
        </div>
        <div class="flex items-center text-sm px-3 py-1.5">
            <span th:text="#{global.total.records}"></span>

            <span class="ml-1 font-bold text-cyan-700 text-base py-1"
                  th:text="${participantPage.totalElements}"></span>
        </div>
        <div class="overflow-x-auto !overflow-visible">
            <div th:replace="~{fragments/common_table :: dynamicTable(
                headers=${listHeaders}, fields=${listFields}, dataList=${listData}, idField=${listIdField},
                currentSortField=${currentSortField}, currentSortDir=${currentSortDir}, pageData=${participantPage}, filters=${filters}
            )}"></div>
        </div>

        <div class="bg-white/60 px-8 py-5 border-t border-gray-200/50">
            <div th:replace="~{fragments/common_pagination :: paginationControls(
                pageData=${participantPage}, currentSortField=${currentSortField}, currentSortDir=${currentSortDir}, filters=${filters}
            )}"></div>
        </div>
    </div>
</div>

<th:block th:fragment="rowContent(item, idField)">
    <td class="px-3 py-2 text-gray-800 font-medium text-center" th:text="${item.vsdcode}">VSD123</td>
    <td class="px-3 py-2 text-gray-800 font-medium text-center" th:text="${item.biccode}">BIC001</td>
    <td class="px-3 py-2 text-gray-800 font-medium text-center" th:text="${item.shortname}">ABC Bank</td>
    <td class="px-3 py-2 text-gray-800 font-medium break-words max-w-[250px] text-left" th:text="${item.fullnameen}" th:title="${item.fullnameen}">ABC Bank Ltd</td>
    <td class="px-3 py-2 text-gray-800 font-medium text-center" th:text="${item.usertype}">MSP</td>
    <td class="px-3 py-2 text-gray-800 font-medium text-center"
        th:text="${#temporals.format(item.updatetime, 'HH:mm:ss-dd/MM/yyyy')}">

    </td>    <td class="px-3 py-2 text-center">
        <span th:if="${item.status == 'A'}" th:text="#{page.participant.status.active}" class="inline-block px-3 py-2 text-xs font-bold text-white bg-cyan-600 rounded-full"></span>
        <span th:if="${item.status == 'B'}" th:text="#{page.participant.status.blocked}" class="inline-block px-3 py-2 text-xs font-bold text-white bg-red-600 rounded-full"></span>
        <span th:if="${item.status == 'M'}" th:text="#{page.participant.status.monitor}" class="inline-block px-3 py-2 text-xs font-bold text-white bg-yellow-500 rounded-full"></span>
    </td>

    <td class="px-6 py-4 text-center relative !overflow-visible">
        <button type="button" class="p-3 rounded-full hover:bg-gray-100 transition-all"
                th:attr="data-id=${item[idField]}" onclick="toggleActionMenu(this)">
            <svg class="w-6 h-6 text-gray-500" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"/>
            </svg>
        </button>

        <div th:id="'menu-panel-' + ${item[idField]}"
             class="action-menu-fixed hidden w-56 bg-white rounded-2xl shadow-2xl border border-gray-200/80 overflow-hidden">
            <div class="py-2">
                <span class="block px-5 py-2 text-xs font-bold text-gray-400 uppercase tracking-wider" th:text="#{global.label.actions}"></span>

                <button type="button" class="open-modal-btn w-full px-5 py-4 text-left text-gray-800 hover:bg-cyan-50 flex items-center gap-4 transition-all font-medium"
                        th:data-modal-title="#{page.participant.button.edit_participant}"
                        th:data-modal-url="@{/participants/edit-participant/{vsdcode}(vsdcode=${item[idField]})}"
                        sec:authorize="!hasRole('MONITOR')">
                    <svg class="w-5 h-5 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    <span th:text="#{global.button.edit}">Edit</span>
                </button>

                <button type="button" class="w-full px-5 py-4 text-left text-red-600 hover:bg-red-50 flex items-center gap-4 transition-all font-medium"
                        th:onclick="confirmDelete([[${item.id}]],[[${item[idField]}]])"
                        sec:authorize="!hasRole('MONITOR')">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7h6m2 0h-10l1-3h8l1 3z"/>
                    </svg>
                    <span th:text="#{global.button.delete}"></span>
                </button>

                <a th:href="@{/participants/view-participant-detail/{vsdcode}(vsdcode=${item[idField]})}"
                   class="w-full px-5 py-4 flex items-center gap-4 text-gray-800 hover:bg-cyan-50 transition-all font-medium">
                    <svg class="w-5 h-5 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                    <span th:text="#{global.button.detail}">Xem chi tiết</span>
                </a>
            </div>
        </div>
    </td>
</th:block>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/common_table.js}"></script>
    <script>
        // CẬP NHẬT: Logic toggle menu fixed thông minh (giữ nguyên logic đóng menu của bạn)
        function toggleActionMenu(button) {
            const itemId = button.getAttribute('data-id');
            const menu = document.getElementById('menu-panel-' + itemId);
            const isHidden = menu.classList.contains('hidden');

            // Đóng tất cả menu khác
            closeAllMenus();

            if (isHidden) {
                menu.classList.remove('hidden');
                menu.style.visibility = 'hidden';

                const rect = button.getBoundingClientRect();
                const menuHeight = menu.offsetHeight;
                const menuWidth = menu.offsetWidth;

                let top = rect.bottom + 8;
                let left = rect.right - menuWidth;

                // Kiểm tra tràn đáy màn hình
                if (top + menuHeight > window.innerHeight) {
                    top = rect.top - menuHeight - 8;
                }

                menu.style.visibility = 'visible';
                menu.style.top = top + 'px';
                menu.style.left = left + 'px';

                const handler = (e) => {
                    if (!menu.contains(e.target) && !button.contains(e.target)) {
                        menu.classList.add('hidden');
                        document.removeEventListener('click', handler);
                        window.removeEventListener('scroll', handler, true);
                    }
                };
                setTimeout(() => {
                    document.addEventListener('click', handler);
                    window.addEventListener('scroll', handler, true);
                }, 10);
            }
        }

        function closeAllMenus() {
            document.querySelectorAll('.action-menu-fixed').forEach(m => m.classList.add('hidden'));
        }

        // Tự động đóng menu khi bấm nút mở Modal
        document.addEventListener('click', (e) => {
            if (e.target.closest('.open-modal-btn')) closeAllMenus();
        });
    </script>

    <script th:inline="javascript">
        const i18n = {
            confirmDeleteTitle: /*[[#{global.confirm.delete.title}]]*/ 'Bạn chắc chắn muốn xóa?',
            confirmDeleteText: /*[[#{global.confirm.delete.text}]]*/ 'Dữ liệu sẽ bị xóa vĩnh viễn!',
            confirmDeleteConfirm: /*[[#{global.confirm.delete.confirm}]]*/ 'Xóa ngay',
            confirmDeleteCancel: /*[[#{global.confirm.delete.cancel}]]*/ 'Hủy',
            deleteSuccessTitle:  /*[[#{global.delete.success.title}]]*/ 'Đã xóa!',
            deleteSuccessText: /*[[#{global.delete.success.text}]]*/ 'Dữ liệu đã được xóa thành công.',
            deleteErrorTitle: /*[[#{global.delete.error.title}]]*/ 'Lỗi!',
            deleteErrorText: /*[[#{global.delete.error.text}]]*/ 'Không thể xóa dữ liệu.'
        };

        function confirmDelete(id, vsdcode) {
            Swal.fire({
                title: i18n.confirmDeleteTitle,
                text: i18n.confirmDeleteText,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#0e7490',
                cancelButtonColor: '#6b7280',
                confirmButtonText: i18n.confirmDeleteConfirm,
                cancelButtonText: i18n.confirmDeleteCancel
            }).then((result) => {
                if (result.isConfirmed) {
                    deleteParticipant(id);
                }
            });
        }

        function deleteParticipant(id) {
            fetch(`/participants/delete-participant/${id}`, {
                method: 'POST',
                headers: { 'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').getAttribute('content') }
            })
                .then(response => { if (!response.ok) throw new Error("Delete failed"); })
                .then(() => {
                    Swal.fire(i18n.deleteSuccessTitle, i18n.deleteSuccessText, 'success').then(() => location.reload());
                })
                .catch(error => {
                    Swal.fire(i18n.deleteErrorTitle, i18n.deleteErrorText, 'error');
                });
        }
    </script>
</th:block>

<script th:if="${errorMessage != null}">
    alert([[${errorMessage}]]);
</script>

</body>
</html>
