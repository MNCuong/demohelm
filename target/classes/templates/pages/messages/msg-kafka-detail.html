<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title layout:fragment="title" th:text="#{page.kafka.detail.title}"></title>
</head>

<body class="bg-slate-50">


<div layout:fragment="content">
    <div id="toast-container"
         class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
    </div>

    <div class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-slate-800"
                th:text="#{page.kafka.detail.heading}">
            </h1>
        </div>


    </div>

    <div class="grid grid-cols-1 gap-6">
        <!-- Thông tin truyền dẫn -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 px-6 py-3 border-b border-slate-200
            flex items-center justify-between">

                <!-- Text bên trái -->
                <h3 class="font-semibold text-slate-700"
                    th:text="#{page.kafka.detail.transportInfo}">
                </h3>

                <!-- Button bên phải -->
                <a th:href="@{/messages/msg-kafka}"
                   class="px-4 py-2 bg-white border border-slate-300 rounded-lg shadow-sm
              hover:bg-slate-50 text-slate-700 flex items-center gap-2">

                    <!-- SVG icon -->
                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="w-4 h-4 text-slate-600"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor"
                         stroke-width="2">
                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              d="M15 19l-7-7 7-7"/>
                    </svg>

                    <span th:text="#{global.button.back}"></span>
                </a>
            </div>


            <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase"
                           th:text="#{page.kafka.detail.key}">
                    </label>
                    <p class="text-slate-500 mt-1">
                        <span class="font-mono text-blue-600"
                              th:text="${detail.key}"></span>
                    </p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase"
                           th:text="#{page.kafka.detail.receivedTime}">
                    </label>
                    <p class="mt-1 text-slate-700 font-mono"
                       th:text="${#temporals.format(detail.timestamp, 'dd/MM/yyyy HH:mm:ss')}"></p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase"
                           th:text="#{page.kafka.detail.category}">
                    </label>
                    <p class="mt-1 text-slate-700"
                       th:text="#{page.kafka.detail.category.value}">
                    </p>
                </div>

                <div class="md:col-span-3">
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2"
                           th:text="#{page.kafka.detail.headers}">
                    </label>
                    <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                        <code class="text-xs text-pink-600 whitespace-pre-wrap break-all leading-relaxed"
                              th:text="${detail.headers}">
                        </code>
                    </div>
                </div>
            </div>
        </div>

        <!-- Nội dung XML -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-gray-100 px-6 py-3 flex justify-between items-center">
                <h3 class="font-semibold text-black"
                    th:text="#{page.kafka.detail.xmlContent}">
                </h3>

                <!-- Button group -->
                <div class="flex items-center gap-3">
                    <button onclick="copyToClipboard()"
                            class="flex items-center gap-2 text-sm font-bold bg-slate-100 hover:bg-slate-200
                   text-slate-700 px-5 py-2.5 rounded-xl transition-all active:scale-95 shadow-sm border border-slate-200">
                        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9" />
                        </svg>
                        <span th:text="#{page.kafka.detail.copy}">Sao chép</span>
                    </button>

                    <button sec:authorize="!hasRole('MONITOR')"
                            onclick="resendKafkaMessage()"
                            class="flex items-center gap-2 text-sm font-bold bg-cyan-600 hover:opacity-80
                   text-white px-5 py-2.5 rounded-xl transition-all active:scale-95 shadow-md">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                        </svg>
                        <span th:text="#{page.msg.detail.resend}">Gửi lại</span>
                    </button>
                </div>

            </div>


            <div class="p-0">
                <pre class="p-6 bg-white text-black-400 overflow-auto custom-scrollbar font-mono text-sm leading-relaxed"
                     style="max-height: 650px; min-height: 300px;">
                    <code id="xmlContent" th:text="${detail.value}"></code>
                </pre>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');

            const toast = document.createElement('div');
            toast.className =
                'pointer-events-auto flex items-center gap-2 ' +
                'bg-slate-900 text-white text-sm font-medium ' +
                'px-4 py-3 rounded-lg shadow-lg ' +
                'opacity-0 translate-x-5 transition-all duration-300';

            let icon = '';

            if (type === 'success') {
                icon = `
          <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2"
               viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M5 13l4 4L19 7" />
          </svg>`;
            } else if (type === 'error') {
                icon = `
          <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" stroke-width="2"
               viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M6 18L18 6M6 6l12 12" />
          </svg>`;
            }

            toast.innerHTML = `${icon}<span>${message}</span>`;
            container.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.remove('opacity-0', 'translate-x-5');
                toast.classList.add('opacity-100', 'translate-x-0');
            });

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-x-0');
                toast.classList.add('opacity-0', 'translate-x-5');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }


        function copyToClipboard() {
            const codeElement = document.getElementById('xmlContent');
            const textArea = document.createElement('textarea');
            textArea.value = codeElement.innerText;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);

            showToast([[#{   page.kafka.detail.copy.success}]],"success") ;
        }
    </script>
    <script th:inline="javascript">
        const MSG_RESEND_SUCCESS = /*[[#{page.msg.resend.success}]]*/ 'Resend success';
        const MSG_RESEND_FAILED = /*[[#{page.msg.resend.failed}]]*/ 'Resend failed';
        const MSG_CONFIRM_TITLE = /*[[#{page.msg.detail.resend.confirm.title}]]*/ 'Confirm resend';
        const MSG_CONFIRM_TEXT = /*[[#{page.msg.detail.resend.confirm.text}]]*/ 'Are you sure?';
        const MSG_CONFIRM_OK = /*[[#{common.button.confirm}]]*/ 'Confirm';
        const MSG_CONFIRM_CANCEL = /*[[#{common.button.cancel}]]*/ 'Cancel';

        function resendKafkaMessage() {

            const msg = document.getElementById('xmlContent').innerText;

            Swal.fire({
                title: MSG_CONFIRM_TITLE,
                text: MSG_CONFIRM_TEXT,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: MSG_CONFIRM_OK,
                cancelButtonText: MSG_CONFIRM_CANCEL
            }).then((result) => {
                if (!result.isConfirmed) return;

                const csrfToken = document.querySelector('meta[name="_csrf"]').content;
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

                fetch('/messages/kafka/resend', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify({msg})
                })
                    .then(res => res.json())
                    .then(data => {
                        window.appToast(data.status, data.message);
                    })
                    .catch(() => {
                        window.appToast('error', MSG_RESEND_FAILED);
                    });
            });
        }
    </script>

</th:block>

</body>
</html>
