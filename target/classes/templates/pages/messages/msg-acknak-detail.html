<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title layout:fragment="title" th:text="#{page.acknack.title.detail}"></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-gradient-to-br from-slate-50 via-cyan-50 to-teal-50 min-h-screen font-sans">

<div layout:fragment="content" >

    <div class="mb-10">
        <h1 class="text-4xl font-extrabold text-transparent-black bg-clip-text bg-gradient-to-r from-cyan-600 to-teal-600"
            th:text="#{page.acknack.title.detail}">
        </h1>
        <p
                class="mt-2 text-sm text-gray-500"
                th:text="#{page.acknack.subtitle.detail}">
        </p>
    </div>

    <div class="max-w-4xl mx-auto space-y-6">

        <!-- Khung 1: Thông tin chi tiết -->
        <div class="bg-white rounded-md shadow-lg border border-gray-200 overflow-hidden">
            <!-- Tiêu đề -->
            <div class="px-6 py-3 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-black" th:text="#{acknak.detail.info}">Thông tin chung</h3>
            </div>

            <!-- Nội dung chi tiết -->
            <div class="px-6 py-5 bg-gradient-to-r from-cyan-50 via-white to-teal-50 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 text-sm text-gray-700">

                <div class="flex flex-col">
                    <span class="font-semibold text-gray-500" th:text="#{acknak.seqid}">Seq ID</span>
                    <span class="text-gray-800 font-medium">[[${ackNakDto.seqid}]]</span>
                </div>
                <div class="flex flex-col">
                    <span class="font-semibold text-gray-500" th:text="#{acknak.biccode}">BIC Code</span>
                    <span class="text-gray-800 font-medium">[[${ackNakDto.biccode}]]</span>
                </div>
                <div class="flex flex-col">
                    <span class="font-semibold text-gray-500" th:text="#{acknak.status}">Status</span>
                    <span th:text="#{|acknak.status.${ackNakDto.status}|}"
                          th:classappend="${ackNakDto.status} == 'S' ? 'text-green-600' : 'text-red-600'"
                          class="font-medium">
                        Status
                    </span>
                </div>
                <div class="flex flex-col">
                    <span class="font-semibold text-gray-500" th:text="#{acknak.actiontime}">Action Time</span>
                    <span class="text-gray-800 font-medium">[[${#temporals.format(ackNakDto.actiontime,'dd/MM/yyyy HH:mm:ss')}]]</span>
                </div>
                <div class="flex flex-col">
                    <span class="font-semibold text-gray-500" th:text="#{acknak.updatetime}">Update Time</span>
                    <span class="text-gray-800 font-medium">[[${#temporals.format(ackNakDto.updatetime,'dd/MM/yyyy HH:mm:ss')}]]</span>
                </div>
            </div>
        </div>

        <!-- Khung 2: Nội dung file -->
        <div class="bg-white rounded-md shadow-lg border border-gray-200 overflow-hidden">
            <!-- Tiêu đề -->
            <div class="px-6 py-3 border-b text-black border-gray-200">
                <h3 class="text-lg font-semibold" th:text="#{acknak.detail.msg}">Chi tiết điện</h3>
            </div>

            <!-- Nội dung file -->
            <div class="px-6 py-6">
                <textarea
                        class="w-full h-[360px] bg-gray-50 border border-gray-300 rounded-md p-4 font-mono text-xs text-gray-800 leading-relaxed
                               scrollbar-thin scrollbar-thumb-gray-400 scrollbar-track-gray-200 shadow-inner resize-none"
                        readonly>
[[${ackNakDto.msg}]]
                </textarea>
            </div>

            <!-- Actions -->
            <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-4 bg-gray-50">
                <button type="button"
                        class="px-6 py-2 text-sm font-medium text-gray-700 bg-gray-200 rounded-md
               hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400
               focus:ring-offset-2 transition"
                        th:text="#{global.button.back}"
                        onclick="history.back()">
                    Quay lại
                </button>

            </div>
        </div>

    </div>
</div>

</body>
</html>
