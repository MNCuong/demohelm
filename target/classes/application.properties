spring.application.name=web-monitor

spring.datasource.url=jdbc:oracle:thin:@//192.168.1.189:1521/orcl.fss.com.vn
spring.datasource.username=VSDSTP
spring.datasource.password=VSDSTP
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver

# ===== JPA / HIBERNATE =====
# Chỉ cho Hibernate biết chúng ta đang dùng "ngôn ngữ" SQL của Oracle
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Tự động tạo/cập nhật bảng từ các @Entity (Chỉ dùng cho DEV)
# (validate, update, create, create-drop, none)
spring.jpa.hibernate.ddl-auto=update

# Hiển thị câu SQL mà Hibernate tạo ra trong console (rất hữu ích khi debug)
spring.jpa.show-sql=true

service.name=web-monitor
server.version=0.0.1
server.port=20251

# ------------------------------------------------------------------------
# Logging / Events: LogBack Setup / File Roll Over,
# ------------------------------------------------------------------------
# Log Groups
logging.group.tomcat=org.apache.catalina, org.apache.coyote, org.apache.tomcat
# Logging Levels for various components
logging.level.org.springframework.boot.web.servlet=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=INFO
logging.level.org.springframework.security.web.FilterChainProxy=INFO
# Spring Default Groups
logging.level.web=INFO
logging.level.sql=INFO
logging.level.tomcat=INFO
logging.level.io.opentelemetry=DEBUG
# Root level logging
logging.level.root=INFO
# Specify the logback configuration file
logging.config=classpath:logback-spring.xml
# Supported Log Format plain / json
logging.format=plain
# Log file paths and rolling policy
logging.path=./logs/${service.name}
# Log File Name. File Extension .log or .json is added dynamically based on logging format.
logging.file.name=${service.name}.v${server.version}
# Log File Pattern for Size and Time based File Roll Over Name
logging.pattern.rolling-file-name=${logging.path}/${logging.file.name}-%d{yyyy-MM-dd}-%i
# Max Single File Size = 30 MB
logging.file.max-size=10MB
# Retention and total size cap for logs
# Keep Log Files for 100 Days with Max Cap at 3 GB
logging.file.max-history=100
logging.file.total-size-cap=3GB

server.servlet.session.timeout=30m

spring.kafka.bootstrap-servers=192.168.27.95:9092
#spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=web-monitor-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Cấu hình Đa ngôn ngữ

# Cú pháp: tên_thư_mục / tên_chung_của_file (không bao gồm _vi hay .properties)
spring.messages.basename=i18n/messages

# Bắt buộc UTF-8 để không lỗi font chữ Việt
spring.messages.encoding=UTF-8

# Cache 1 tiếng (để dev sửa file properties xong F5 trình duyệt ăn luôn không cần restart)
spring.messages.cache-duration=1h
spring.jackson.time-zone=Asia/Ho_Chi_Minh

#Redis
spring.data.redis.host=192.168.27.95
spring.data.redis.port=30079
spring.data.redis.password=123dat
spring.data.redis.timeout=2000
session.timeout.seconds=30
app.banned.ttl.minutes=5
path.report=C:\\Users\\MNC\\OneDrive\\Desktop\\csv

healthcheck.host.route=http://192.168.27.95:32394
healthcheck.host.ig=http://192.168.27.95:30506
kafka.topic.tcpserver.request=tcpserver.request
kafka.topic.core.report=CoreReport
kafka.topic.report.file=ReportFile

#LDAP Config
# false = DB, true = LDAP
com.fss.esb.login.ldap.mode=true
LDAP_PROVIDER_URL=ldap://192.168.1.61:389
LDAP_INITIAL_CONTEXT_FACTORY=com.sun.jndi.ldap.LdapCtxFactory

#them toi ngay 6/2
# Kafka Consumer Configuration
spring.kafka.consumer.max-poll-records=1
spring.kafka.consumer.max-poll-interval-ms=180000
spring.kafka.consumer.enable-auto-commit=false

# Hibernate/JPA Configuration
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.fetch_size=1000

# Report Batch Processing
report.batch.size=10000
report.buffer.size=65536

# CSV Processing
csv.buffer.size=65536
csv.batch.size=10000

# Kafka Producer (nếu cần)
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.linger-ms=1
spring.kafka.producer.buffer-memory=33554432

# Database Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging for monitoring
logging.level.com.example.web_monitor=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.kafka=INFO

# Thread Pool for Async Processing
report.executor.core-pool-size=4
report.executor.max-pool-size=8
report.executor.queue-capacity=100