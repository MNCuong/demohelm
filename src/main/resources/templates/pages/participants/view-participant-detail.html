<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title layout:fragment="title" th:text="#{participant.detail.title}">Chi tiết thành viên</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-gradient-to-br from-slate-50 via-cyan-50 to-teal-50 min-h-screen">
<div layout:fragment="content" >

    <!-- Header -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10 gap-4">
        <h1 class="text-3xl font-bold text-gray-900" th:text="#{participant.detail.header}">
            Chi tiết thành viên
        </h1>

        <a href="/participants/list-participants"
           class="inline-flex items-center px-5 py-2 text-sm font-semibold text-gray-900 bg-white border border-gray-300 rounded-lg shadow-sm hover:bg-gray-100 transition duration-200">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                 xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            <span th:text="#{global.button.back}">Quay lại</span>
        </a>
    </div>

    <!-- Main Card -->
    <div class="bg-white rounded-2xl shadow-lg border border-gray-200 divide-y divide-gray-200 overflow-hidden">

        <!-- Section: Định danh & Trạng thái -->
        <div class="p-8">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800 border-b pb-2 border-gray-100"
                th:text="#{participant.section.identity}">Định danh & Trạng thái
            </h2>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

                <div class="lg:col-span-2">
                    <p class="text-gray-500 font-medium" th:text="#{participant.fullnamevn}">Tên đầy đủ (VN)</p>
                    <p class="text-cyan-700  text-sm"
                       th:text="${participant.fullnamevn != null && !#strings.isEmpty(participant.fullnamevn) ? participant.fullnamevn : 'NaN'}"></p>
                </div>

                <div class=" items-center">
                    <p class="text-gray-500 mr-3 font-medium" th:text="#{participant.status}">Trạng thái:</p>

                    <div th:switch="${participant.status}">

                        <p th:case="'A'"
                              class="inline-flex items-center px-4 py-1.5 rounded-full text-xs  tracking-wide uppercase
                                     bg-cyan-600 text-white"
                              th:text="#{page.participant.status.active}">
                        </p>

                        <p th:case="'M'"
                              class="inline-flex items-center px-4 py-1.5 rounded-full text-xs  tracking-wide uppercase
                                     bg-yellow-600 text-white"
                              th:text="#{page.participant.status.monitor}">
                        </p>

                        <p th:case="'B'"
                              class="inline-flex items-center px-4 py-1.5 rounded-full text-xs  tracking-wide uppercase
                                     bg-red-600 text-white"
                              th:text="#{page.participant.status.blocked}">
                        </p>

                        <p th:case="*"
                              class="inline-flex items-center px-4 py-1.5 rounded-full text-xs  tracking-wide uppercase
                                     bg-gray-100 text-gray-800">
                            Unknown
                        </p>

                    </div>


                </div>


                <div>
                    <p class="text-gray-500 font-medium" th:text="#{participant.vsdcode}">VSD Code</p>
                    <p class="text-gray-900 " th:text="${participant.vsdcode}"></p>
                </div>

                <div>
                    <p class="text-gray-500 font-medium" th:text="#{participant.biccode}">BIC Code</p>
                    <p class="text-gray-900 " th:text="${participant.biccode}"></p>
                </div>

                <div>
                    <p class="text-gray-500 font-medium" th:text="#{participant.shortname}">Short Name</p>
                    <p class="text-gray-900 " th:text="${participant.shortname}"></p>
                </div>

                <div class="lg:col-span-2">
                    <p class="text-gray-500 font-medium" th:text="#{participant.fullnameen}">Tên đầy đủ (EN)</p>
                    <p class="text-sm text-cyan-700"
                       th:text="${participant.fullnameen != null && !#strings.isEmpty(participant.fullnameen) ? participant.fullnameen : 'NaN'}"></p>
                </div>

            </div>
        </div>

        <!-- Section: Cấu hình Hệ thống -->
        <div class="p-8">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800 border-b pb-2 border-gray-100"
                th:text="#{participant.section.system}">Cấu hình Hệ thống
            </h2>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

                <!--                <div>-->
                <!--                    <p class="text-gray-500 font-medium" th:text="#{participant.usertype}">User Type</p>-->
                <!--                    <p class="text-gray-900 font-medium" th:text="${participant.usertype}"></p>-->
                <!--                </div>-->

                <div>
                    <p class="text-gray-500 font-medium" th:text="#{participant.usertype}">User Type</p>
                    <p class="text-gray-900 " th:text="${participant.usertype}"></p>
                </div>

                <div>
                    <p class="text-gray-500 font-medium" th:text="#{participant.groupqueue}">Group Queue</p>
                    <p class="text-gray-900 " th:text="${participant.groupqueue}"></p>
                </div>

                <!--                <div>-->
                <!--                    <p class="text-gray-500 font-medium" th:text="#{participant.consumers}">Consumers</p>-->
                <!--                    <p class="text-gray-900 font-medium" th:text="${participant.consumers}"></p>-->
                <!--                </div>-->

                <div>
                    <p class="text-gray-500 font-medium" th:text="#{participant.updatetime}">Thời gian cập nhật</p>
                    <p class="text-gray-900 "
                       th:text="${#temporals.format(participant.updatetime, 'dd/MM/yyyy HH:mm:ss')}"></p>
                </div>

            </div>
        </div>

    </div>

</div>
</body>
</html>
