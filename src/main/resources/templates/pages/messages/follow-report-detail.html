<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">

<head>
    <title layout:fragment="title">Chi tiết điện</title>
</head>
<style>
    @keyframes flow-line {
        0% {
            transform: translateY(-100%);
        }
        100% {
            transform: translateY(100%);
        }
    }
</style>
<body class="bg-gradient-to-br from-slate-50 via-cyan-50 to-teal-50 min-h-screen font-sans">
<div layout:fragment="content" class="container mx-auto px-4 py-6 md:px-6 lg:py-8">
    <div class="max-w-auto mx-auto">

        <div class="mb-6 flex items-center justify-between">
            <div>
                <h1 class="text-4xl font-extrabold text-transparent-black bg-clip-text bg-gradient-to-r from-cyan-600 to-teal-600"
                    th:text="#{page.rptlog.detail.title}"></h1>
<!--                <p class="mt-1 text-sm text-gray-500" th:text="#{page.msg.detail.header}"></p>-->
            </div>

        </div>

        <div class="grid grid-cols-12 gap-6">

            <div class="col-span-12 lg:col-span-4 space-y-6">
                <div class="bg-white p-8 rounded-md shadow-xl shadow-slate-200/50
            flex flex-col items-center text-center">

                    <div class="relative mb-6">


                        <!-- Icon circle -->
                        <div class="relative w-20 h-20 rounded-full flex items-center justify-center border-2 bg-white"
                             th:classappend="${rptLog.status == '2' ? 'border-emerald-500 text-emerald-500'
     : (rptLog.status == 'E' or rptLog.status == '3' ? 'border-red-500 text-red-500'
     : 'border-amber-500 text-amber-500')}">

                            <svg th:if="${rptLog.status == '0'}"
                                 class="w-10 h-10 text-slate-400"
                                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>

                            <svg th:if="${rptLog.status == '1'}"
                                 class="w-10 h-10 text-amber-500 animate-spin"
                                 style="animation-duration: 3s;"
                                 viewBox="0 0 24 24"
                                 fill="none"
                                 stroke="currentColor"
                                 stroke-width="2"
                                 stroke-linecap="round"
                                 stroke-linejoin="round">

                                <path d="M21 12a9 9 0 0 0-15.5-6.14L3 8" />
                                <path d="M3 3v5h5" />

                                <path d="M3 12a9 9 0 0 0 15.5 6.14L21 16" />
                                <path d="M21 21v-5h-5" />
                            </svg>

                            <svg th:if="${rptLog.status == '2'}"
                                 class="w-10 h-10 text-emerald-500"
                                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                      d="M5 13l4 4L19 7"/>
                            </svg>

                            <svg th:if="${rptLog.status == '3'}"
                                 class="w-10 h-10 text-red-500"
                                 fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M6 18L18 6M6 6l12 12" />
                            </svg>

                            <svg th:if="${rptLog.status == 'E'}"
                                 class="w-10 h-10 text-red-600"
                                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                            </svg>
                        </div>
                    </div>
                    <p class="text-xs font-bold text-slate-400 uppercase mt-1 tracking-widest">
                        [[#{page.rptlog.field.status}]]
                    </p>
                    <h3 class="text-xl font-black text-slate-800 italic uppercase">
                        [[#{'filter.option.status.' + ${rptLog.status}}]]
                    </h3>


                </div>

                <div class="bg-white p-6 rounded-md shadow-xl shadow-slate-200/50 space-y-5">
                    <a href="javascript:history.back()"
                       class="inline-flex items-center gap-2
          px-4 py-2 rounded-lg
          border border-slate-300
          bg-white
          text-sm font-bold text-slate-600
          shadow-sm
          hover:border-cyan-400
          hover:text-cyan-600
          hover:shadow-md
          transition-all duration-200
          group">

                        <!-- SVG Arrow Left -->
                        <svg xmlns="http://www.w3.org/2000/svg"
                             class="w-4 h-4 text-slate-400
                group-hover:text-cyan-500 transition-colors"
                             fill="none"
                             viewBox="0 0 24 24"
                             stroke="currentColor"
                             stroke-width="2">
                            <path stroke-linecap="round"
                                  stroke-linejoin="round"
                                  d="M15 19l-7-7 7-7"/>
                        </svg>

                        <span th:text="#{action.back}">Quay lại</span>
                    </a>

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">[[#{page.report.table.header.filename}]]</label>
                        <div class="bg-slate-50 rounded-xl p-3 border border-slate-100">
                            <p class="text-xs text-slate-600 break-all font-mono leading-relaxed" th:text="${rptLog.filename ?: 'N/A'}"></p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">[[#{page.rptlog.field.vsdcode}]]</label>
                            <p class="text-sm font-bold text-slate-700 font-mono" th:text="${rptLog.vsdcode ?: '---'}"></p>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">[[#{page.rptlog.field.systype}]]</label>
                            <p class="text-sm font-bold text-cyan-600" th:text="${rptLog.systype}"></p>
                        </div>
                    </div>

                </div>
            </div>

            <div class="col-span-12 lg:col-span-8 space-y-6">
                <div class="bg-white rounded-md shadow-xl shadow-slate-200/50 overflow-hidden">
                    <div class="px-8 py-6 border-b border-slate-50 bg-white/40">
                        <h2 class="text-lg font-black text-slate-800 uppercase tracking-tight">[[#{page.rptlog.section.general}]]</h2>
                    </div>

                    <div class="p-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10">

                            <div class="relative pl-6 border-l-2 border-slate-100 hover:border-cyan-400 transition-colors group">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest group-hover:text-cyan-500 transition-colors">[[#{page.rptlog.field.corerefid}]]</label>
                                <p class="text-base font-bold text-slate-900 mt-1" th:text="${rptLog.corerefid}"></p>
                            </div>

                            <div class="relative pl-6 border-l-2 border-slate-100 hover:border-cyan-400 transition-colors group">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest group-hover:text-cyan-500 transition-colors">[[#{page.rptlog.field.rptname}]]</label>
                                <p class="text-base font-bold text-slate-700 mt-1" th:text="${rptLog.rptname}"></p>
                            </div>

                            <div class="relative pl-6 border-l-2 border-slate-100 hover:border-cyan-400 transition-colors group">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest group-hover:text-cyan-500 transition-colors">[[#{page.rptlog.field.msgtype}]]</label>
                                <p class="text-base font-semibold text-slate-600 mt-1" th:text="${rptLog.msgtype}"></p>
                            </div>

                            <div class="relative pl-6 border-l-2 border-slate-100 hover:border-cyan-400 transition-colors group">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest group-hover:text-cyan-500 transition-colors">[[#{page.rptlog.field.createdate}]]</label>
                                <p class="text-base font-semibold text-slate-600 mt-1 font-mono" th:text="${#temporals.format(rptLog.createdate,'dd/MM/yyyy HH:mm:ss')}"></p>
                            </div>

                            <div class="relative pl-6 border-l-2 border-slate-100
            hover:border-cyan-400 transition-colors group">

                                <label
                                        class="block text-[10px] font-black text-slate-400 uppercase tracking-widest
               group-hover:text-cyan-500 transition-colors">
                                    Parent Message
                                </label>

                                <textarea
                                        readonly
                                        class="mt-2 w-full h-40 resize-none
               bg-slate-50 border border-slate-200 rounded-md
               p-3 text-xs font-mono text-slate-600
               focus:outline-none focus:ring-0
               shadow-inner overflow-auto"
                                        th:text="${rptLog.parrentmsg ?: 'N/A'}">
    </textarea>

                            </div>


                        </div>
                    </div>

                    <div th:if="${rptLog.errmsg != null}" class="m-6 mt-0">
                        <div class="bg-red-50/50 rounded-[1.5rem] border border-red-100 overflow-hidden">
                            <div class="px-6 py-4 border-b border-red-100 bg-red-100/20 flex items-center gap-3">
                                <span class="relative flex h-3 w-3">
                                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                  <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                                </span>
                                <h4 class="text-xs font-black text-red-700 uppercase tracking-widest">[[#{page.rptlog.field.errmsg}]]</h4>
                            </div>
                            <div class="p-6">
                                <div class="bg-white rounded-xl p-4 shadow-inner border border-red-50">
                                    <pre class="text-xs text-red-600 whitespace-pre-wrap font-mono leading-relaxed" th:text="${rptLog.errmsg}"></pre>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
